
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаленный доступ</title>
    <style>
        /* Сброс отступов и базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px;
        }

        /* Затемнение фона при открытом модальном окне */
        body.modal-open {
            overflow: hidden;
        }

        /* Контейнер-сетка: 2 колонки, 3 строки */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 280px);
            grid-template-rows: repeat(2, 240px);
            gap: 24px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
            margin-bottom: 40px;
        }

        /* Стиль плитки (карточки) */
        .tile {
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            cursor: default;
            border: none;
            outline: none;
        }

        /* Эффект при наведении — визуальное выделение */
        .tile:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 30px -10px rgba(0, 0, 0, 0.25);
            background-color: #ffffff;
            filter: brightness(1.02);
        }

        /* Контейнер для картинки */
        .icon-area {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: #eef2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* Стиль для изображений */
        .icon-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .tile:hover .icon-area img {
            transform: scale(1.1);
        }

        /* Контейнер для ссылок */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 4px;
        }

        /* Стиль каждой ссылки */
        .link {
            display: inline-block;
            padding: 8px 16px;
            background-color: #f0f4fa;
            border-radius: 40px;
            color: #1a3b5d;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background-color 0.2s, color 0.2s, box-shadow 0.2s, transform 0.2s;
            border: 1px solid transparent;
            word-break: break-word;
            cursor: pointer;
        }

        .link:hover {
            background-color: #d4e0f0;
            color: #0f2b44;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            text-decoration: none;
            transform: translateX(2px);
        }

        /* Стиль кнопки авторизации */
        .auth-button {
            display: inline-block;
            padding: 16px 48px;
            background-color: #1a3b5d;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            border-radius: 50px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 20px;
            border: 2px solid transparent;
        }

        .auth-button:hover {
            transform: translateY(-4px);
            background-color: #2c4c74;
            box-shadow: 0 18px 25px -10px rgba(0, 0, 0, 0.4);
            filter: brightness(1.05);
        }

        .auth-button:active {
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -8px rgba(0, 0, 0, 0.3);
        }

        /* Контейнер для кнопки */
        .button-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* Стили для модального окна */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background-color: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: modalAppear 0.3s ease-out;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal h2 {
            color: #1a3b5d;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .modal p {
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .modal-button {
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .modal-button.close {
            background-color: #e2e8f0;
            color: #1a3b5d;
        }

        .modal-button.close:hover {
            background-color: #cbd5e0;
            transform: translateY(-2px);
        }

        .modal-button.link {
            background-color: #1a3b5d;
            color: white;
        }

        .modal-button.link:hover {
            background-color: #2c4c74;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Адаптивность */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, auto);
                gap: 16px;
                margin-bottom: 30px;
            }
            .tile {
                padding: 16px 8px;
            }
            .icon-area {
                width: 64px;
                height: 64px;
            }
            .auth-button {
                padding: 14px 36px;
                font-size: 1rem;
            }
            .modal {
                padding: 30px 20px;
                width: 95%;
            }
            .modal h2 {
                font-size: 1.5rem;
            }
            .modal-buttons {
                flex-direction: column;
            }
            .modal-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <script>
        // Получаем элементы
        const modalOverlay = document.getElementById('modalOverlay');
        const openModalLink = document.getElementById('openModalLink');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        // Открытие модального окна при клике на @zdrav.mos.ru
        openModalLink.addEventListener('click', function(e) {
            e.preventDefault(); // Предотвращаем переход по ссылке
            modalOverlay.style.display = 'flex';
            document.body.classList.add('modal-open');
        });

        // Закрытие модального окна по кнопке "Да" с показом всплывающего окна
        closeModalBtn.addEventListener('click', function() {
            modalOverlay.style.display = 'none';
            document.body.classList.remove('modal-open');
            alert('Для сброса пароля напишите название cвоего почтового ящика @zdrav.mos.ru на SalinVA@zdrav.mos.ru');
        });

        // Закрытие модального окна при клике на затемненную область
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        });

        // Предотвращаем закрытие при клике на само модальное окно
        document.querySelector('.modal').addEventListener('click', function(e) {
            e.stopPropagation();
        });
    </script>
